name: Check

on:
  pull_request:
    branches:
      - master

jobs:
  check:
    uses: wetransform/gha-workflows/.github/workflows/gradle-library-check.yml@1e60dcabbcf6acccf458c4626baaef1db63f9a8a # v4.1.3

  docker:
    uses: wetransform/gha-workflows/.github/workflows/gradle-service-check.yml@1e60dcabbcf6acccf458c4626baaef1db63f9a8a # v4.1.3
    with:
      image-tag: wetransform/hale-cli:latest # image to scan
      # don't run tests since this is already done in check
      gradle-tasks: clean dockerTagLatest
      expect-tests: false

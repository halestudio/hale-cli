[tools]
java = "temurin-17.0.19+10"

# git hooks
hk = "1.50.0"
pkl = "0.32.0"

[env]
# explicitly use pkl CLI instead of pklr library because the latter does not support all language features needed
HK_PKL_BACKEND = "pkl"

[hooks]
enter = "mise x -- hk install --mise"
postinstall = "mise x -- hk install --mise"
